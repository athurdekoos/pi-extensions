name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: title
    attributes:
      label: Bug Title
      description: A short, descriptive title for the bug.
      placeholder: e.g. Extension crashes on startup
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What Happened
      description: A clear description of what actually happened.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen instead.
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The version of the extension or package where you encountered the bug.
      placeholder: e.g. 0.1.0
    validations:
      required: true
